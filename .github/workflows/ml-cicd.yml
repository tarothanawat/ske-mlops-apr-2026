name: ml-cicd

on:
  push:
    branches: [main]
    paths:
      - "serving/**"
      - "airflow/dags/**"
      - "tests/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}/model-serving:${{ github.sha }}
  IMAGE_LATEST: ghcr.io/${{ github.repository }}/model-serving:latest

jobs:

  test:
    name: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install dependencies
        run: |
          pip install ruff pytest httpx \
            fastapi uvicorn pydantic \
            mlflow scikit-learn pandas numpy \
            feature-engine minio python-dotenv

      - name: lint with ruff
        run: ruff check serving/ airflow/dags/

      - name: run unit tests
        run: pytest tests/ -v

  build:
    name: build-and-push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./serving
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: pull and restart serving container
        run: |
          docker pull ${{ env.IMAGE_LATEST }}
          docker stop model-serving 2>/dev/null || true
          docker rm   model-serving 2>/dev/null || true
          docker run -d \
            --name model-serving \
            -p 8000:8000 \
            -e MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }} \
            -e MLFLOW_S3_ENDPOINT_URL=${{ secrets.MLFLOW_S3_ENDPOINT_URL }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e MODEL_NAME=house_price_prediction \
            -e MODEL_STAGE=Production \
            ${{ env.IMAGE_LATEST }}

      - name: smoke test
        run: |
          sleep 15
          curl -f http://localhost:8000/health || exit 1
          echo "Deploy successful"
